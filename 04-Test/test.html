<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Mobile App Screen</title>
    <style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}
    </style>
</head>
<body>
	<div class="mobile-screen">
		<div class="status-bar">
			<span>9:41</span>
			<span> 🔋</span>
		</div>

		<div class="content">
			<h1 class="greeting">DOBRYI DEN' CZAN!</h1>
			<p class="date">Суббота, 4 июля</p>
			<p class="subtitle">Ваш ритуал на сегодня</p>

			<div class="ritual-card">
				<div class="ritual-image">🌲</div>
				<h3 class="ritual-title">"Лёгкая практика"</h3>
				<div class="ritual-info">
					<span>50 мин</span>
					<span>Масляные краски - Холст</span>
				</div>
				<button class="start-btn">Начать</button>
			</div>

			<h3 class="section-title">Вчерашние работы</h3>
			<div class="works-grid">
				<div class="work-item">
					<div class="work-image">🎨</div>
				</div>
				<div class="work-item">
					<div class="work-image">️</div>
				</div>
				<div class="work-item">
					<div class="work-image">🌊</div>
				</div>
				<div class="work-item">
					<div class="work-image">🌸</div>
				</div>
			</div>
		</div>

		<nav class="bottom-nav">
			<div class="nav-item active">
				<span class="nav-icon">🏠</span>
				<span>Главная</span>
			</div>
			<div class="nav-item">
				<span class="nav-icon"></span>
				<span>Дневник</span>
			</div>
			<div class="nav-item">
				<span class="nav-icon">🎨</span>
				<span>Галерея</span>
			</div>
			<div class="nav-item">
				<span class="nav-icon">👤</span>
				<span>Профиль</span>
			</div>
		</nav>
	</div>
</body>
</html>
