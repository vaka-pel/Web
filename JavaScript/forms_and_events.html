<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="forms_and_events.css">
    <title>Формы и события</title>
    <style>
        
    </style>
</head>
<body>
    <h1>Формы и события</h1>
	<details>
		<summary>Простейшие задачи</summary>
		<h2>Factorial</h2>
		<div class="task">
			<!--<div class="pair">
		</div>-->
			<label for="number">введите целое число от 0 до 170:</label>
			<input id="number" type="number" onchange="Factorial()">
			<button onclick="Factorial()">Вычислить</button>

		</div>
		<div id="factorial-result" class="result"></div>
		<!--<input id="factorial-result" class="result" type="text">-->
		<hr>
		<h2>Power</h2>
		<div class="task">

		</div>
	</details>

	<div class="images-and-colors">
		<div class="upload-image">
			<div class="image-container">
				<img alt="Фото студента" id="image">
			</div>
			<input type="file" id="image-file" onchange="setImage()">
		</div>

		<div class="colors">
			<div class="select-color">
				<label for="background-color">Цвет фона</label>
				<input type="color" id="background-color" value="white" oninput="setBackgroundColor()">
			</div>
			<div class="select-color">
				<label for="foreground-color">Цвет текста</label>
				<input type="color" id="foreground-color" oninput="setForegroundColor()">
			</div>
		</div>
	</div>

    <script src="forms_and_events.js">
        
    </script>
</body>
</html>
